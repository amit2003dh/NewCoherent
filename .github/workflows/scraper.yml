name: B2B Hiring Intent Scraper

on:
  schedule:
    # Run every 12 hours (at 00:00 and 12:00 UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allow manual triggering
  
  # Also run on pushes to main for testing
  push:
    branches: [ main, master ]

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run scraper pipeline
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        MAX_PAGES: ${{ vars.MAX_PAGES || '5' }}
        SEARCH_KEYWORDS: ${{ vars.SEARCH_KEYWORDS || 'software engineer' }}
        SEARCH_LOCATION: ${{ vars.SEARCH_LOCATION || 'India' }}
        REQUEST_DELAY_MIN: ${{ vars.REQUEST_DELAY_MIN || '2' }}
        REQUEST_DELAY_MAX: ${{ vars.REQUEST_DELAY_MAX || '5' }}
      run: |
        python main_pipeline.py
        
    - name: Upload pipeline logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: pipeline-logs
        path: pipeline.log
        retention-days: 7
        
    - name: Notify on success
      if: success()
      run: |
        echo "✅ Scraper pipeline completed successfully at $(date)"
        
    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ Scraper pipeline failed at $(date)"
        echo "Check the logs for details"
